<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Intercambio de Comisiones Medicina UNMDP</title>

    <style>

        body {
            font-family: Arial;
            max-width: 600px;
            margin: auto;
            padding: 20px;
        }

        select, input, button {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
        }

        button {
            cursor: pointer;
        }

        #msg {
            margin-top: 20px;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <h2>Intercambio de Comisiones Medicina UNMDP</h2>

    <form id="form"
          action="https://script.google.com/macros/s/AKfycbz1aM5R_Gygv8F1zQ3Ha_RVdOL_MAlqULzH6ycCfie5WkFSsUqoNfkh0WrJb5aVvXnFiw/exec"
          method="POST"
          target="hidden_iframe">

        <label>Materia</label>

        <select name="materia" required>

            <option value="">Seleccionar materia</option>

            <option>Concepción y Formación del Ser Humano I</option>
            <option>Articulación Básico Clínico Comunitaria I</option>
            <option>Hábitat, Ecología y Salud</option>
            <option>Psicología Comunitaria, Social e Institucional</option>
            <option>Promoción de Salud Crítica y Educación para la Salud</option>
            <option>Concepción y Formación del Ser Humano II</option>
            <option>Articulación Básico Clínico Comunitaria II</option>

            <option>Nacimiento, Crecimiento y Desarrollo</option>
            <option>Articulación Básico Clínico Comunitaria III</option>
            <option>Agentes, Mecanismos de Defensa y Nutrición</option>
            <option>Prevención e Investigación Acción en Salud</option>
            <option>Interculturalidad y Salud</option>
            <option>Desgaste y Envejecimiento</option>

            <option>Articulación Básico Clínico Comunitaria IV</option>
            <option>Epidemiología Crítica Social y Comunitaria</option>
            <option>Tamizaje y Ciencias de Diagnóstico</option>
            <option>Redes y Sistemas de Salud</option>
            <option>Salud Integral de la Mujer</option>

            <option>Medicina Interna y Campos Clínicos I</option>
            <option>Salud Colectiva y Comunitaria</option>
            <option>Terapéuticas y Farmacología</option>
            <option>Salud del Trabajador y Medicina del Deporte</option>
            <option>Salud del Niño Niña y Adolescente</option>
            <option>Salud Mental</option>

            <option>Medicina Interna y Campos Clínicos II</option>
            <option>Medicina General I</option>
            <option>Programas de Salud</option>
            <option>Salud del Adulto Mayor</option>
            <option>Clínica Quirúrgica y Emergentología</option>
            <option>Bioética y Derechos Humanos</option>
            <option>Medicina General II y Rehabilitación</option>
            <option>Medicina Legal y Toxicología</option>

            <option>Tecnologías en Salud</option>
            <option>Informática en Salud</option>
            <option>Inglés Aplicado a la Medicina I</option>
            <option>Inglés Aplicado a la Medicina II</option>
            <option>Inglés Aplicado a la Medicina III</option>
            <option>Inglés Aplicado a la Medicina IV</option>

        </select>

        <br><br>

        <label>Comisión que tenés</label>
        <select id="tengo" name="tengo" required></select>

        <br><br>

        <label>Comisión que buscás</label>
        <select id="busco" name="busco" required></select>

        <br><br>

        <label>Email</label>
        <input type="email" name="email" required>

        <br><br>

        <button type="submit">Publicar solicitud</button>

    </form>

    <iframe name="hidden_iframe" style="display:none;"></iframe>

    <p id="msg"></p>

    <script>

        const form = document.getElementById("form")
        const tengo = document.getElementById("tengo")
        const busco = document.getElementById("busco")
        const msg = document.getElementById("msg")

        for (let i = 1; i <= 40; i++) {

            let o1 = document.createElement("option")
            o1.value = i
            o1.text = "Comisión " + i
            tengo.appendChild(o1)

            let o2 = document.createElement("option")
            o2.value = i
            o2.text = "Comisión " + i
            busco.appendChild(o2)

        }

        form.addEventListener("submit", function (e) {

            msg.innerText = ""

            if (tengo.value == busco.value) {

                e.preventDefault()
                alert("No podés buscar la misma comisión que tenés")
                return

            }

            msg.innerText = "Publicando solicitud..."

        })

        document.querySelector("iframe").addEventListener("load", function () {

            msg.innerText = "Solicitud publicada correctamente"

            form.reset()

        })

    </script>

</body>
</html>
